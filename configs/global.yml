# =============================================================================
# Global experiment configuration
# =============================================================================
# This file controls experiment-wide settings shared by all methods.
# Per-method parameters live in configs/<method>.yml

# === FFE (Fitness Function Evaluations) Budget ===
# Each range block is allocated this many FFEs.
# All heuristic methods (PSO, PPSO, Memetic-*) MUST stop when this limit is reached.
# This ensures fair comparison: methods are evaluated on solution quality
# under identical computational budget.
#
# Recommended: 1500~2000 FFE per range block for 256x256 images
# Full Search uses ~7700 FFE per block; heuristics target ~20-30% of that.
ffe_budget_per_block: 1500

# === FIC Partitioning Parameters (must be consistent across methods) ===
image_size: 256       # Resize input images to this (square) size
range_size: 8         # Range block size (8x8)
domain_size: 16       # Domain block size (16x16, downsampled to 8x8)
domain_stride: 8      # Domain block stride

# === Decoding ===
decode_iterations: 20

# === Reproducibility ===
seed: 42
n_runs: 1             # Number of independent runs per (method, image)
                      # For final paper experiments, set to >= 5 and report mean ± std

# === Output ===
output_dir: results
save_fic: true        # Save .fic binary compressed file
save_codes_json: true # Save human-readable codes.json (debug)
